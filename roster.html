<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALPHA | Clan Roster</title>
  <meta name="description" content="ALPHA Clan Warzone roster — view all active operators and their stats.">
  <meta property="og:title" content="ALPHA Clan HQ | Roster">
  <meta property="og:description" content="View the full ALPHA Clan Warzone roster.">
  <meta property="og:url" content="https://infectit007.github.io/alpha-clan-hq/roster.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="scanlines" aria-hidden="true"></div>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span class="logo-bracket">[</span><span class="logo-text">ALPHA</span><span class="logo-bracket">]</span>
    </a>
    <div class="nav-links">
      <a href="index.html#stats">STATS</a>
      <a href="roster.html" class="active">ROSTER</a>
      <a href="matches.html">MATCHES</a>
      <a href="social.html">FEED</a>
      <a href="register.html">JOIN CLAN</a>
    </div>
    <div class="nav-burger">☰</div>
  </nav>
  <main>
    <section style="padding:80px 40px;min-height:60vh;text-align:center">
      <div class="section-label">// OPERATORS</div>
      <h1 class="section-title">CLAN ROSTER</h1>
      <p class="section-sub" style="max-width:600px;margin:16px auto 32px">Full list of approved ALPHA operators. Stats update automatically from tracker.gg every 30 minutes.</p>
      <div id="rosterContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;max-width:1200px;margin:0 auto"></div>
      <div id="rosterEmpty" style="display:none;color:var(--text-muted);padding:40px">
        <p>No operators loaded yet. Request access to join the clan.</p>
      </div>
    </section>
  </main>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script>
    document.addEventListener('supabase-ready', async () => {
      const container = document.getElementById('rosterContainer');
      const empty = document.getElementById('rosterEmpty');
      let players = window.ACTIVE_PLAYERS || PLAYERS;
      if (players.length === 0) { empty.style.display = 'block'; return; }
      container.innerHTML = players.map((p,i) => {
        const c = AVATAR_COLORS[i % AVATAR_COLORS.length];
        const initials = (p.name||'?').split('_').map(w=>w[0]).join('').slice(0,2);
        return `<div class="roster-card" style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;text-align:center">
          <div style="width:48px;height:48px;border-radius:50%;background:${c.bg};color:${c.color};display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-weight:700;font-size:18px;font-family:monospace">${initials}</div>
          <div style="font-weight:600;font-size:16px;color:#c9d1d9">${p.name||'Unknown'}</div>
          <div style="font-size:12px;color:${c.color};margin:4px 0">${p.tag||''}</div>
          <div style="font-size:11px;color:var(--text-muted);margin:8px 0">${p.isReal?'APPROVED':'PLACEHOLDER'}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;font-size:11px">
            <div><span style="color:var(--text-muted)">K/D</span><br><span style="color:var(--accent);font-weight:600">${p.kd?p.kd.toFixed(2):'0.00'}</span></div>
            <div><span style="color:var(--text-muted)">KILLS</span><br><span style="color:var(--accent);font-weight:600">${p.kills?p.kills.toLocaleString():'0'}</span></div>
            <div><span style="color:var(--text-muted)">WINS</span><br><span style="color:var(--accent);font-weight:600">${p.wins||'0'}</span></div>
            <div><span style="color:var(--text-muted)">MATCHES</span><br><span style="color:var(--accent);font-weight:600">${p.matches||'0'}</span></div>
          </div>
        </div>`;
      }).join('');
    });
    setTimeout(() => { if (!document.getElementById('rosterContainer').children.length) document.getElementById('rosterEmpty').style.display = 'block'; }, 4000);
  </script>
  <script src="js/matrix.js"></script>
</body>
</html>
